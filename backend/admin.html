<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - BAPhone</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
    body { margin: 0; background: #f5f7fb; color: #111827; }
    .container { width: min(1100px, calc(100% - 24px)); margin: 30px auto; }
    .header { background: #111; color: white; padding: 22px; border-radius: 18px; margin-bottom: 24px; }
    .card { background: white; border-radius: 18px; padding: 22px; box-shadow: 0 10px 24px rgba(0,0,0,0.06); margin-bottom: 24px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .full { grid-column: 1 / -1; }
    input, textarea { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 12px; }
    button { border: none; border-radius: 12px; padding: 12px 18px; font-weight: 700; cursor: pointer; }
    .submit-btn { background: #ffd400; }
    .delete-btn { width: 100%; margin-top: 12px; background: #fee2e2; color: #b91c1c; }
    .product-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 18px; }
    .product-item img { width: 100%; height: 190px; object-fit: cover; border-radius: 12px; }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>Trang Admin</h1>
    </div>

    <div class="card">
      <h2>Thêm sản phẩm</h2>

      <form id="productForm" enctype="multipart/form-data">
        <div class="grid">
          <input type="text" name="name" placeholder="Tên sản phẩm" required />
          <input type="text" name="price" placeholder="Giá" required />
          <textarea name="description" placeholder="Mô tả" class="full"></textarea>
          <input type="file" name="image" class="full" />
        </div>

        <button type="submit" class="submit-btn">Thêm</button>
        <div id="message"></div>
      </form>
    </div>

    <div class="card">
      <h2>Danh sách</h2>
      <div id="productList" class="product-list"></div>
    </div>
  </div>

  <script>
    // ✅ FIX API (QUAN TRỌNG)
    const API_URL = "/api/products";

    const form = document.getElementById("productForm");
    const message = document.getElementById("message");
    const productList = document.getElementById("productList");

    // load sản phẩm
    async function loadProducts() {
      const res = await fetch(API_URL);
      const products = await res.json();

      productList.innerHTML = "";

      products.forEach(p => {
        const div = document.createElement("div");

        // ✅ FIX IMAGE (QUAN TRỌNG)
        let img = p.image;
        if (img && img.includes("localhost")) {
          img = img.replace("http://localhost:5000", "");
        }

        div.innerHTML = `
          <div class="product-item">
            <img src="${img}" />
            <h3>${p.name}</h3>
            <p>${Number(p.price).toLocaleString("vi-VN")}đ</p>
            <button onclick="deleteProduct('${p._id}')">Xóa</button>
          </div>
        `;

        productList.appendChild(div);
      });
    }

    // thêm sản phẩm
    form.onsubmit = async (e) => {
      e.preventDefault();

      const formData = new FormData(form);

      const res = await fetch(API_URL, {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      if (!res.ok) {
        message.innerText = data.error || "Lỗi";
        message.style.color = "red";
        return;
      }

      message.innerText = "OK";
      message.style.color = "green";
      form.reset();
      loadProducts();
    };

    // xóa
    async function deleteProduct(id) {
      await fetch(`${API_URL}/${id}`, { method: "DELETE" });
      loadProducts();
    }

    loadProducts();
  </script>
</body>
</html>
